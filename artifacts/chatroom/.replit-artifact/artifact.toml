kind = "web"
previewPath = "/"
title = "Chatroom"
version = "1.0.0"
id = "artifacts/chatroom"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23774

[services.development]
run = "pnpm --filter @workspace/chatroom run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chatroom", "run", "build" ]
publicDir = "artifacts/chatroom/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23774"
BASE_PATH = "/"
